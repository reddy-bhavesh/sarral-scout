apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scout-ingress
  namespace: scout
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Enable for Let's Encrypt SSL
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - scout.yourdomain.com
  #     secretName: scout-tls
  rules:
    - host: scout.sarral.io # Replace with your domain
      http:
        paths:
          # API routes to backend
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /scans
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /system
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /reports
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /breaches
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /api/webintel
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # All other paths to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
