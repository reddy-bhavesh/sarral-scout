version: '3.8'

services:
  # Frontend - React SPA served by Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: scout-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - scout-network
    restart: unless-stopped

  # Backend - FastAPI with Security Tools
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: scout-backend
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=file:/app/data/dev.db
      # Execution mode - "local" for container, "ssh" for remote Kali
      - EXECUTION_MODE=local
      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-this}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      # AI APIs
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DATABRICKS_API_KEY=${DATABRICKS_API_KEY:-}
      - DATABRICKS_API_BASE=${DATABRICKS_API_BASE:-}
      - DATABRICKS_MODEL=${DATABRICKS_MODEL:-}
      # Microsoft SSO (optional)
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-organizations}
      - ENABLE_MICROSOFT_SSO=${ENABLE_MICROSOFT_SSO:-false}
    volumes:
      # Persistent storage for database
      - scout-db:/app/data
      # Persistent storage for reports
      - scout-reports:/app/reports
    networks:
      - scout-network
    restart: unless-stopped
    # Allow running security tools
    cap_add:
      - NET_RAW
      - NET_ADMIN

networks:
  scout-network:
    driver: bridge

volumes:
  scout-db:
    driver: local
  scout-reports:
    driver: local
