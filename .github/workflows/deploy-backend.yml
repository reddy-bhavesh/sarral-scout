name: Deploy Backend

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "Dockerfile.backend"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (e.g., v5). Leave empty for auto-increment."
        required: false
        type: string

permissions:
  contents: write # Required to push Git tags

env:
  ACR_NAME: "sarralscoutacr"
  RESOURCE_GROUP: "rg-sarral-scan"
  BACKEND_APP_NAME: "scout-backend"
  IMAGE_NAME: "scout-backend"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            # Get the latest backend version tag
            LATEST_TAG=$(git tag -l 'backend-v*' | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="v1"
            else
              # Extract number and increment
              CURRENT_NUM=$(echo "$LATEST_TAG" | sed 's/backend-v//')
              NEXT_NUM=$((CURRENT_NUM + 1))
              VERSION="v${NEXT_NUM}"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Backend version: $VERSION"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and Push Backend Image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "🏗️ Building backend image with version: $VERSION"

          # Build with version tag
          docker build -f Dockerfile.backend -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION

          # Also push 'latest' tag
          docker tag $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

          echo "✅ Pushed: $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION"

      - name: Set Backend Secrets
        run: |
          az containerapp secret set \
            --name $BACKEND_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --secrets "jwt-secret=${{ secrets.JWT_SECRET }}" "gemini-api-key=${{ secrets.GEMINI_API_KEY }}" "databricks-api-key=${{ secrets.DATABRICKS_API_KEY }}"

      - name: Deploy Backend to ACA
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          az containerapp update \
            --name $BACKEND_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION \
            --set-env-vars JWT_SECRET=secretref:jwt-secret \
                           GEMINI_API_KEY=secretref:gemini-api-key \
                           DATABRICKS_API_KEY=secretref:databricks-api-key \
                           DATABRICKS_API_BASE="${{ vars.DATABRICKS_API_BASE }}" \
                           DATABRICKS_MODEL="${{ vars.DATABRICKS_MODEL }}" \
                           MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}" \
                           ENABLE_MICROSOFT_SSO=true \
                           DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                           EXECUTION_MODE=local

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git tag "backend-$VERSION"
          git push origin "backend-$VERSION"
          echo "🏷️ Created tag: backend-$VERSION"

      - name: Summary
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "## 🚀 Backend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`$ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git Tag | \`backend-$VERSION\` |" >> $GITHUB_STEP_SUMMARY
