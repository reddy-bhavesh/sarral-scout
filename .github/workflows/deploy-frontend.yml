name: Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "Dockerfile.frontend"
      - "nginx.conf"
      - "nginx.conf.template"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (e.g., v5). Leave empty for auto-increment."
        required: false
        type: string

permissions:
  contents: write # Required to push Git tags

env:
  ACR_NAME: "sarralscoutacr"
  RESOURCE_GROUP: "rg-sarral-scan"
  FRONTEND_APP_NAME: "scout-frontend"
  BACKEND_APP_NAME: "scout-backend"
  IMAGE_NAME: "scout-frontend"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tags

      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          else
            # Get the latest frontend version tag
            LATEST_TAG=$(git tag -l 'frontend-v*' | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              # No tags exist, but we know v3 was the last from ACR
              # Start at v4 to continue the sequence
              VERSION="v4"
            else
              # Extract number and increment
              CURRENT_NUM=$(echo "$LATEST_TAG" | sed 's/frontend-v//')
              NEXT_NUM=$((CURRENT_NUM + 1))
              VERSION="v${NEXT_NUM}"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Frontend version: $VERSION"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Get Backend URL
        id: get-backend-url
        run: |
          URL=$(az containerapp show --name $BACKEND_APP_NAME --resource-group $RESOURCE_GROUP --query properties.configuration.ingress.fqdn -o tsv)
          echo "BACKEND_URL=https://$URL" >> $GITHUB_OUTPUT

      - name: Build and Push Frontend Image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "🏗️ Building frontend image with version: $VERSION"

          docker build -f Dockerfile.frontend \
            --build-arg VITE_MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}" \
            --build-arg VITE_MICROSOFT_AUTHORITY="${{ vars.VITE_MICROSOFT_AUTHORITY }}" \
            --build-arg VITE_MICROSOFT_REDIRECT_URI="" \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION .
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION

          # Also push 'latest' tag
          docker tag $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION $ACR_NAME.azurecr.io/$IMAGE_NAME:latest
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

          echo "✅ Pushed: $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION"

      - name: Deploy Frontend to ACA
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          az containerapp update \
            --name $FRONTEND_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION \
            --set-env-vars BACKEND_URL=${{ steps.get-backend-url.outputs.BACKEND_URL }}

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git tag "frontend-$VERSION"
          git push origin "frontend-$VERSION"
          echo "🏷️ Created tag: frontend-$VERSION"

      - name: Summary
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "## 🚀 Frontend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`$ACR_NAME.azurecr.io/$IMAGE_NAME:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git Tag | \`frontend-$VERSION\` |" >> $GITHUB_STEP_SUMMARY
