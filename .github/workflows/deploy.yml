name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  ACR_NAME: "sarralscoutacr"
  RESOURCE_GROUP: "rg-sarral-scan"
  BACKEND_APP_NAME: "scout-backend"
  FRONTEND_APP_NAME: "scout-frontend"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build and Push Backend Image
        run: |
          docker build -f Dockerfile.backend -t $ACR_NAME.azurecr.io/scout-backend:${{ github.sha }} .
          docker push $ACR_NAME.azurecr.io/scout-backend:${{ github.sha }}
          # Also push 'latest' tag
          docker tag $ACR_NAME.azurecr.io/scout-backend:${{ github.sha }} $ACR_NAME.azurecr.io/scout-backend:latest
          docker push $ACR_NAME.azurecr.io/scout-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}" \
            --build-arg VITE_MICROSOFT_AUTHORITY="${{ vars.VITE_MICROSOFT_AUTHORITY }}" \
            --build-arg VITE_MICROSOFT_REDIRECT_URI="" \
            -t $ACR_NAME.azurecr.io/scout-frontend:${{ github.sha }} .
          docker push $ACR_NAME.azurecr.io/scout-frontend:${{ github.sha }}
          # Also push 'latest' tag
          docker tag $ACR_NAME.azurecr.io/scout-frontend:${{ github.sha }} $ACR_NAME.azurecr.io/scout-frontend:latest
          docker push $ACR_NAME.azurecr.io/scout-frontend:latest

      - name: Ensure PostgreSQL Container Exists
        env:
          STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT_NAME }}
          STORAGE_KEY: ${{ secrets.STORAGE_ACCOUNT_KEY }}
        run: |
          # Check if postgres container exists, create if not
          if ! az containerapp show --name scout-postgres --resource-group $RESOURCE_GROUP &>/dev/null; then
            echo "Creating PostgreSQL container..."
            ENVIRONMENT=$(az containerapp show --name $BACKEND_APP_NAME --resource-group $RESOURCE_GROUP --query properties.environmentId -o tsv | xargs basename)
            
            # Ensure storage is linked to environment
            az containerapp env storage set \
              --name $ENVIRONMENT \
              --resource-group $RESOURCE_GROUP \
              --storage-name scoutfilestorage \
              --azure-file-account-name "$STORAGE_ACCOUNT" \
              --azure-file-account-key "$STORAGE_KEY" \
              --azure-file-share-name scoutdata \
              --access-mode ReadWrite || true
            
            # Create postgres with volume mount
            az containerapp create \
              --name scout-postgres \
              --resource-group $RESOURCE_GROUP \
              --environment $ENVIRONMENT \
              --image postgres:15-alpine \
              --min-replicas 1 \
              --max-replicas 1 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --env-vars POSTGRES_USER=scout POSTGRES_PASSWORD=scout_password POSTGRES_DB=scoutdb PGDATA=/var/lib/postgresql/data/pgdata \
              --ingress internal \
              --target-port 5432
            
            # Add volume mount (requires separate update with YAML)
            echo "Note: Volume mount requires manual setup - see deployment docs"
          else
            echo "PostgreSQL container already exists"
          fi

      - name: Set Backend Secrets
        run: |
          az containerapp secret set \
            --name $BACKEND_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --secrets "jwt-secret=${{ secrets.JWT_SECRET }}" "gemini-api-key=${{ secrets.GEMINI_API_KEY }}" "databricks-api-key=${{ secrets.DATABRICKS_API_KEY }}"

      - name: Deploy Backend to ACA
        run: |
          az containerapp update \
            --name $BACKEND_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/scout-backend:${{ github.sha }} \
            --set-env-vars JWT_SECRET=secretref:jwt-secret \
                           GEMINI_API_KEY=secretref:gemini-api-key \
                           DATABRICKS_API_KEY=secretref:databricks-api-key \
                           DATABRICKS_API_BASE="${{ vars.DATABRICKS_API_BASE }}" \
                           DATABRICKS_MODEL="${{ vars.DATABRICKS_MODEL }}" \
                           MICROSOFT_CLIENT_ID="${{ secrets.MICROSOFT_CLIENT_ID }}" \
                           ENABLE_MICROSOFT_SSO=true \
                           DATABASE_URL="postgresql://scout:scout_password@scout-postgres/scoutdb" \
                           EXECUTION_MODE=local

      - name: Get Backend URL
        id: get-backend-url
        run: |
          URL=$(az containerapp show --name $BACKEND_APP_NAME --resource-group $RESOURCE_GROUP --query properties.configuration.ingress.fqdn -o tsv)
          echo "BACKEND_URL=https://$URL" >> $GITHUB_ENV

      - name: Deploy Frontend to ACA
        run: |
          az containerapp update \
            --name $FRONTEND_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/scout-frontend:${{ github.sha }} \
            --set-env-vars BACKEND_URL=$BACKEND_URL
